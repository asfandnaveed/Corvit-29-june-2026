<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Chef</title>

    <style>
        @font-face {
            font-family: "Contrail" ;
            src: url("assets/fonts/ContrailOne-Regular.ttf");
        }
        @font-face {
            font-family: "poppins-regular" ;
            src: url("assets/fonts/Poppins/Poppins-Light.ttf");
        }
        @font-face {
            font-family: "poppins-medium" ;
            src: url("assets/fonts/Poppins/Poppins-SemiBold.ttf");
        }
        body{
            padding: 0px;
            margin: 0px;
            background-color: #181818;
        }
        .bg{
            padding-left: 2.2rem;
            padding-right: 2.2rem;
        }
        .grid{
            display: grid;
            grid-template-columns: 5fr 7fr;
            color: white;
        }
        .h-img{
            width: 100%;
        }
        .h-heading{
            font-size: 4.1rem;
            font-family: "Contrail";
        }

        .h-heading-color{
            color: #F7B41A;
        }
        .left-side{
            display: flex;
            flex-direction: column;
            justify-content: center;
            
        }
        .h-subheading{
            columns: white;
            font-family: "poppins-regular" ;

        }
        .h-btn{
            background-color: #F7B41A;
            color: white;
            border-radius: 50px;
            border: none;
            width: 25%;
            padding-top: .8rem;
            padding-bottom: .8rem;
            font-family: "poppins-medium" ;
            font-size: 1rem;
            margin-top: 2rem;
        }
        .customer-review{
            position: relative;
            margin-top: 2rem;
        }

        .review{
            width: 80px;
            position: absolute;
        }
        .h-img2{
            left: 50px;
        }
        .h-img3{
            left: 100px;
        }
        
    </style>
</head>
<body>
    <header></header>

    <main class="bg">

        <div class="grid">
            <div class="left-side">
                <div class="h-heading">Grab Big Deals on <span class="h-heading-color">Yummy Meals!</span></div>
                <div class="h-subheading">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quaerat dicta laboriosam quidem numquam in impedit quo qui architecto, exercitationem suscipit </div>
                <button class="h-btn">Get Started</button>
                <div class="customer-review">
                    <img class="review" src="assets/images/customer.png" alt="">
                    <img class="review h-img2" src="assets/images/customer.png" alt="">
                    <img class="review h-img3" src="assets/images/customer.png" alt="">
                </div>
            </div>
            <div>
                <img class="h-img" src="assets/images/header.png" alt="">
            </div>
        </div>

    </main>


    <footer></footer>
    
</body>
</html>
