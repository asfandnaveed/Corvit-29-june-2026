<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link rel="stylesheet" href="aseets/css/style.css">
</head>

<body>

  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-7 col-12 d-flex flex-column justify-content-center ps-5">

        <div class="position-relative">
          <!-- Backward Div Rotated box -->
          <div class="position-absolute bg-white rating-box rating-box1-rotate rounded-4"></div>
          <!-- Front Box  -->
          <div
            class="position-relative bg-white rating-box-text rating-box text-center rounded-4 shadow d-flex flex-column justify-content-center">

            <div class=" d-flex justify-content-center gap-3">
              <div class="rating-icon">
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-half"></i>
              </div>
              <div>|</div>
              <div>4.5</div>
            </div>
            <div class="pt-2">5K Happy Reviews</div>
          </div>
        </div>

        <div class="h-subheading">Crispy, Crunchy, Veggie Deliciousness!</div>
        <div class="h-heading">Burgers That Love the Earth!</div>
        <div class="explore-more d-flex align-items-center gap-3">
          <button class="btn btn-light btn-explore ">Explore</button>
          <i class="bi bi-play-circle"></i>
          <a href="">Play Demo...</a>
        </div>
      </div>

      <div class="col-lg-5 col-12 p-0">

        <picture>
          <source media="(max-width:992px)" srcset="aseets/images/mobile_header.png">
          <img class="img-fluid" src="aseets/images/header.png" alt="">
        </picture>

      </div>
    </div>

  </div>

  <section>
    <div class="container">
      <div class="row">

        <div class="col-12 text-center">
          <div class="hot-items-heading text-uppercase">-- Hot Items --</div>
          <div class="hot-items-subheading text-uppercase">Locally sourced, organic ingredients for a fresh and
            eco-friendly experience</div>
        </div>

        <div class="col-3">
          <div class="p-background">
            <img src="aseets/images/products/1.png" alt="">
            <div>Veg crispy burger</div>
            <div class="d-flex justify-content-between">
              <div>₹250.00</div>
              <i class="bi bi-bag"></i>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
